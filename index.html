<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkly — Daily Checklist</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F0;
      --surface: #FFFFFF;
      --surface2: #F0EDE6;
      --border: rgba(0,0,0,0.1);
      --text: #1A1A18;
      --text2: #6B6860;
      --text3: #A8A59E;
      --accent: #2D6A4F;
      --accent-light: #D8F3DC;
      --accent-text: #1B4332;
      --danger: #C0392B;
      --danger-light: #FDECEA;
    }

    [data-theme="dark"] {
      --bg: #141412;
      --surface: #1E1D1B;
      --surface2: #2A2926;
      --border: rgba(255,255,255,0.08);
      --text: #F0EDE6;
      --text2: #9A9790;
      --text3: #5A5855;
      --accent: #52B788;
      --accent-light: #1B4332;
      --accent-text: #D8F3DC;
      --danger: #E74C3C;
      --danger-light: #3B1A1A;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    header {
      max-width: 640px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--accent);
    }

    .theme-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .theme-btn:hover { background: var(--surface2); }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 5px 14px;
      font-size: 13px;
      color: var(--text2);
    }

    .stat-pill strong { color: var(--text); font-weight: 500; }

    .add-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]::placeholder { color: var(--text3); }
    input[type="text"]:focus { border-color: var(--accent); }

    .add-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .add-btn:hover { opacity: 0.88; }
    .add-btn:active { transform: scale(0.97); }

    .tag-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tag-row label {
      font-size: 12px;
      color: var(--text3);
      margin-right: 2px;
    }

    .tag-input {
      flex: 1;
      min-width: 120px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
    }
    .tag-input:focus { border-color: var(--accent); }

    .tag-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 5px 14px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent-light);
      color: var(--accent-text);
      border-color: var(--accent);
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin: 1.25rem 0 0.5rem;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      transition: opacity 0.2s, transform 0.15s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .task-item.done { opacity: 0.45; }

    .cb-wrap {
      flex-shrink: 0;
      margin-top: 2px;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
      border-radius: 4px;
    }

    .task-body { flex: 1; min-width: 0; }

    .task-text {
      font-size: 15px;
      color: var(--text);
      cursor: pointer;
      word-break: break-word;
      line-height: 1.4;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--text3);
    }

    .task-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 5px;
    }

    .tag-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 50px;
      background: var(--accent-light);
      color: var(--accent-text);
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .tag-badge:hover { opacity: 0.7; }

    .del-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      margin-top: 1px;
    }
    .del-btn:hover {
      color: var(--danger);
      background: var(--danger-light);
    }

    .empty {
      text-align: center;
      padding: 3rem 0;
      color: var(--text3);
      font-size: 15px;
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 0.5rem;
    }

    .bottom-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 1rem;
    }

    .clear-btn {
      background: none;
      border: none;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text3);
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }
    .clear-btn:hover { color: var(--danger); }

    @media (max-width: 480px) {
      .logo { font-size: 22px; }
      .add-btn { padding: 10px 14px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Check<span>ly</span></div>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙 Dark</button>
  </header>
  <main>
    <div class="stats-row" id="stats-row"></div>

    <div class="add-card">
      <div class="add-row">
        <input type="text" id="task-input" placeholder="What needs to be done?" />
        <button class="add-btn" onclick="addTask()">+ Add</button>
      </div>
      <div class="tag-row">
        <label>Tags:</label>
        <input type="text" class="tag-input" id="tag-input" placeholder="work, personal, urgent..." />
      </div>
      <div class="tag-hint">Separate multiple tags with commas. Click a tag to filter.</div>
    </div>

    <div class="filter-row" id="filter-row"></div>

    <div id="task-container"></div>

    <div class="bottom-row">
      <button class="clear-btn" onclick="clearDone()">Clear completed</button>
    </div>
  </main>

  <script>
    let tasks = JSON.parse(localStorage.getItem('checkly-tasks') || '[]');
    let activeFilter = null;
    const isDark = () => document.documentElement.getAttribute('data-theme') === 'dark';

    function save() {
      localStorage.setItem('checkly-tasks', JSON.stringify(tasks));
    }

    function toggleTheme() {
      const btn = document.getElementById('theme-btn');
      if (isDark()) {
        document.documentElement.setAttribute('data-theme', 'light');
        btn.textContent = '🌙 Dark';
        localStorage.setItem('checkly-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        btn.textContent = '☀️ Light';
        localStorage.setItem('checkly-theme', 'dark');
      }
    }

    function parseTags(str) {
      return str.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
    }

    function addTask() {
      const text = document.getElementById('task-input').value.trim();
      if (!text) return;
      const tagStr = document.getElementById('tag-input').value;
      const tags = parseTags(tagStr);
      tasks.unshift({ id: Date.now(), text, tags, done: false });
      document.getElementById('task-input').value = '';
      document.getElementById('tag-input').value = '';
      save(); render();
    }

    function toggle(id) {
      const t = tasks.find(t => t.id === id);
      if (t) t.done = !t.done;
      save(); render();
    }

    function remove(id) {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      save(); render();
    }

    function setFilter(tag) {
      activeFilter = activeFilter === tag ? null : tag;
      render();
    }

    function allTags() {
      const set = new Set();
      tasks.forEach(t => t.tags.forEach(tag => set.add(tag)));
      return [...set];
    }

    function render() {
      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      const tags = allTags();

      document.getElementById('stats-row').innerHTML = `
        <div class="stat-pill"><strong>${total}</strong> total</div>
        <div class="stat-pill"><strong>${done}</strong> done</div>
        <div class="stat-pill"><strong>${total - done}</strong> remaining</div>
      `;

      const filterRow = document.getElementById('filter-row');
      if (tags.length > 0) {
        filterRow.innerHTML = '<button class="filter-btn ' + (!activeFilter ? 'active' : '') + '" onclick="setFilter(null)">All</button>' +
          tags.map(tag => `<button class="filter-btn ${activeFilter === tag ? 'active' : ''}" onclick="setFilter('${tag}')">#${tag}</button>`).join('');
      } else {
        filterRow.innerHTML = '';
      }

      const filtered = activeFilter ? tasks.filter(t => t.tags.includes(activeFilter)) : tasks;
      const pending = filtered.filter(t => !t.done);
      const completed = filtered.filter(t => t.done);

      let html = '';

      if (filtered.length === 0) {
        html = `<div class="empty"><div class="empty-icon">✓</div>${activeFilter ? 'No tasks with tag #' + activeFilter : 'No tasks yet — add one above!'}</div>`;
      } else {
        if (pending.length > 0) {
          html += `<div class="section-label">To do — ${pending.length}</div><div class="task-list">`;
          html += pending.map(t => taskHTML(t)).join('');
          html += '</div>';
        }
        if (completed.length > 0) {
          html += `<div class="section-label">Completed — ${completed.length}</div><div class="task-list">`;
          html += completed.map(t => taskHTML(t)).join('');
          html += '</div>';
        }
      }

      document.getElementById('task-container').innerHTML = html;
    }

    function taskHTML(t) {
      const tagBadges = t.tags.map(tag =>
        `<span class="tag-badge" onclick="setFilter('${tag}'); event.stopPropagation()">#${tag}</span>`
      ).join('');
      return `
        <div class="task-item ${t.done ? 'done' : ''}">
          <div class="cb-wrap">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
          </div>
          <div class="task-body">
            <div class="task-text" onclick="toggle(${t.id})">${escHtml(t.text)}</div>
            ${t.tags.length ? `<div class="task-tags">${tagBadges}</div>` : ''}
          </div>
          <button class="del-btn" onclick="remove(${t.id})" title="Delete">✕</button>
        </div>
      `;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });
    document.getElementById('tag-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    // Restore theme
    const saved = localStorage.getItem('checkly-theme');
    if (saved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('theme-btn').textContent = '☀️ Light';
    }

    render();
  </script>
</body>
</html>
